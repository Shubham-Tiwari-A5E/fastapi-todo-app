<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Todo App</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>🔐 Login</h2>
            <p class="auth-subtitle">Welcome back! Please login to your account</p>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="username" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="/register">Sign up here</a>
            </p>
            <p class="auth-footer">
                <a href="/">← Back to Home</a>
            </p>
            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #e0e0e0; text-align: center; font-size: 0.85rem; color: #666;">
                💻 Developed by <strong style="color: #6366f1;">Shubham Tiwari</strong><br>
                📧 <a href="mailto:sstt291094@gmail.com" style="color: #6366f1;">sstt291094@gmail.com</a> | 
                📱 <a href="https://wa.me/918171619990" target="_blank" style="color: #6366f1;">+91 817 161 9990</a>
            </div>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
