<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Todo App</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>📝 Create Account</h2>
            <p class="auth-subtitle">Join us and start managing your tasks</p>

            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="phone_number">📱 WhatsApp Number (Optional)</label>
                    <input type="tel" id="phone_number" name="phone_number" placeholder="+919876543210"
                           pattern="^\+[1-9]\d{1,14}$"
                           title="Format: +[country code][number] (e.g., +919876543210)">
                    <small style="color: #666; font-size: 0.85rem;">
                        ✨ Get welcome message & task reminders on WhatsApp!
                    </small>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="/login">Login here</a>
            </p>
            <p class="auth-footer">
                <a href="/">← Back to Home</a>
            </p>
            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #e0e0e0; text-align: center; font-size: 0.85rem; color: #666;">
                💻 Developed by <strong style="color: #6366f1;">Shubham Tiwari</strong><br>
                📧 <a href="mailto:sstt291094@gmail.com" style="color: #6366f1;">sstt291094@gmail.com</a> | 
                📱 <a href="https://wa.me/918171619990" target="_blank" style="color: #6366f1;">+91 817 161 9990</a>
            </div>
        </div>
    </div>

    <script src="/static/js/register.js"></script>
</body>
</html>
